name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Python compile check
        run: python -m compileall -q server.py api server_modules scripts

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Account pool regression checks
        run: npm run account-pool-regression

      - name: Smoke checks
        run: npm run smoke

      - name: API contract checks
        run: npm run api-contract

      - name: Production build
        run: npm run build
