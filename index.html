<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品内容管理工作台</title>
    <style>
        :root {
            color-scheme: light;
            --page: #f3f5f7;
            --surface: #ffffff;
            --surface-soft: #f8fafb;
            --surface-tint: #edf7f4;
            --line: #e2e7ee;
            --line-strong: #cbd5df;
            --text: #151b26;
            --muted: #667085;
            --subtle: #9aa4b2;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --accent-soft: #e7f5f2;
            --blue: #3157d5;
            --plum: #6d5bd0;
            --gold: #a86916;
            --red: #c24135;
            --shadow: 0 20px 54px rgba(31, 41, 55, 0.12);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
                linear-gradient(135deg, #f1f4f7 0%, #fbfcfd 52%, #f2f7f4 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .app {
            width: min(1440px, 100%);
            margin: 0 auto;
        }

        .launch-warning {
            display: none;
            margin-bottom: 14px;
            border: 1px solid #f6d391;
            border-radius: var(--radius);
            padding: 13px 16px;
            background: #fff8e7;
            color: #7c4a03;
            line-height: 1.6;
        }

        .launch-warning.is-visible {
            display: block;
        }

        .launch-warning strong {
            color: #5f3700;
        }

        .launch-warning a {
            color: var(--blue);
            font-weight: 800;
            text-decoration: none;
        }

        .shell {
            overflow: hidden;
            border: 1px solid rgba(203, 213, 223, 0.92);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            padding: 22px 24px 18px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
        }

        h1 {
            margin: 0;
            font-size: 25px;
            line-height: 1.25;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
        }

        .top-actions {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 38px;
            border: 1px solid transparent;
            border-radius: var(--radius);
            padding: 0 14px;
            background: #fff;
            color: var(--text);
            font-size: 13px;
            font-weight: 750;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(31, 41, 55, 0.08);
        }

        .btn.primary {
            border-color: var(--accent);
            background: linear-gradient(180deg, #12867d 0%, var(--accent-strong) 100%);
            color: #fff;
            box-shadow: 0 10px 20px rgba(15, 118, 110, 0.18);
        }

        .btn.primary:hover {
            background: linear-gradient(180deg, #0f7d75 0%, #0f5c56 100%);
        }

        .btn.ghost {
            border-color: var(--line);
            color: var(--muted);
            background: rgba(255, 255, 255, 0.72);
        }

        .btn.ghost:hover {
            color: var(--text);
        }

        .btn.danger {
            border-color: #f2c6c2;
            color: var(--red);
            background: #fffafa;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            border: 1px solid #badfd8;
            border-radius: 999px;
            padding: 4px 11px;
            background: var(--accent-soft);
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .status-pill.error {
            border-color: #fecdd3;
            background: #fff1f2;
            color: #be123c;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid var(--line);
            background: #f7f9fb;
        }

        .metric {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 13px 14px;
            background: #fff;
        }

        .metric-label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 750;
        }

        .metric-value {
            margin-top: 5px;
            color: #111827;
            font-size: 23px;
            font-weight: 900;
            line-height: 1;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(240px, 0.85fr) minmax(280px, 1fr) minmax(460px, 1.65fr);
            gap: 12px;
            min-height: 690px;
            padding: 12px;
            background: #f3f6f8;
        }

        .page-shell {
            min-height: 690px;
            padding: 14px;
            background: #f3f6f8;
        }

        .breadcrumbs {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .crumb-btn {
            border: 0;
            border-radius: 999px;
            padding: 6px 10px;
            background: #fff;
            color: var(--accent-strong);
            font-size: 13px;
            font-weight: 800;
        }

        .crumb-current {
            color: #111827;
            font-weight: 850;
        }

        .page {
            display: none;
        }

        .page.active {
            display: grid;
            gap: 14px;
        }

        .page-card {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #fff;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .country-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            padding: 12px;
        }

        .pane {
            min-width: 0;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #fff;
        }

        .pane:last-child {
            border-right: 1px solid var(--line);
        }

        .pane-header {
            display: grid;
            gap: 12px;
            padding: 14px;
            border-bottom: 1px solid var(--line);
            background: #fbfcfd;
        }

        .pane-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .pane-title {
            margin: 0;
            color: #111827;
            font-size: 15px;
            font-weight: 850;
            line-height: 1.3;
        }

        .pane-hint {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .search-input,
        .text-input,
        .number-input {
            width: 100%;
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 0 11px;
            background: #fbfcfd;
            color: var(--text);
            outline: none;
            transition: border-color 0.16s ease, box-shadow 0.16s ease;
        }

        .search-input:focus,
        .text-input:focus,
        .number-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        .list {
            display: grid;
            gap: 8px;
            align-content: start;
            max-height: 570px;
            overflow: auto;
            padding: 10px;
        }

        .list-item {
            width: 100%;
            border: 1px solid transparent;
            border-radius: var(--radius);
            padding: 11px;
            background: #f8fafb;
            color: inherit;
            text-align: left;
            transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
        }

        .list-item:hover {
            border-color: var(--line);
            background: #fff;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(31, 41, 55, 0.07);
        }

        .list-item.active {
            border-color: rgba(15, 118, 110, 0.36);
            background: var(--surface-tint);
            box-shadow: inset 3px 0 0 var(--accent);
        }

        .product-row,
        .country-row {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .logo-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            flex: 0 0 42px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: linear-gradient(180deg, #ffffff 0%, #eef3f7 100%);
            color: #64748b;
            font-size: 16px;
            font-weight: 900;
        }

        .logo-chip img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5px;
        }

        .flag-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            flex: 0 0 34px;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: #fff;
            font-size: 20px;
        }

        .item-main {
            min-width: 0;
            flex: 1;
        }

        .item-name {
            overflow: hidden;
            color: #111827;
            font-size: 14px;
            font-weight: 850;
            line-height: 1.35;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item-meta {
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.35;
        }

        .detail {
            display: grid;
            gap: 16px;
            padding: 14px;
            border-bottom: 1px solid var(--line);
            background: #fbfcfd;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 96px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
        }

        .logo-upload {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 96px;
            height: 96px;
            overflow: hidden;
            border: 1.5px dashed #b8c4d2;
            border-radius: var(--radius);
            background: linear-gradient(180deg, #ffffff 0%, #eef3f7 100%);
            color: var(--muted);
            cursor: pointer;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.45;
            text-align: center;
            transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
        }

        .logo-upload:hover {
            border-color: var(--accent);
            background: var(--surface-tint);
            transform: translateY(-1px);
        }

        .logo-upload img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 8px;
        }

        .field-stack {
            display: grid;
            gap: 10px;
        }

        .product-folder {
            display: grid;
            gap: 8px;
        }

        .folder-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin: 6px 4px 0;
            color: #334155;
            font-size: 12px;
            font-weight: 850;
            letter-spacing: 0;
        }

        .folder-count {
            color: var(--subtle);
            font-size: 11px;
            font-weight: 750;
        }

        .folder-items {
            display: grid;
            gap: 8px;
            margin-left: 8px;
            border-left: 2px solid rgba(15, 118, 110, 0.20);
            padding-left: 10px;
        }

        .field-label {
            display: block;
            margin-bottom: 5px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 750;
        }

        .context-line {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            padding: 14px;
            border-bottom: 1px solid var(--line);
            background: #fbfcfd;
        }

        .context-title {
            margin: 0;
            color: #111827;
            font-size: 16px;
            font-weight: 850;
            line-height: 1.3;
        }

        .context-meta {
            margin-top: 4px;
            color: var(--muted);
            font-size: 12px;
        }

        .concept-area {
            display: grid;
            align-content: start;
            gap: 12px;
            max-height: 578px;
            overflow: auto;
            padding: 10px;
        }

        .concept-group {
            display: grid;
            gap: 8px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 10px;
            background: #fff;
        }

        .concept-group-header {
            display: grid;
            grid-template-columns: minmax(150px, 1fr) auto auto;
            gap: 8px;
            align-items: center;
        }

        .concept-group-title {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 3px 8px;
            background: var(--surface-soft);
            white-space: nowrap;
        }

        .concept-group-title .concept-input {
            font-size: 14px;
            min-width: 120px;
        }

        .concept-path {
            color: var(--subtle);
            font-size: 12px;
            font-weight: 850;
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .concept-group-items {
            display: grid;
            gap: 8px;
            margin-left: 12px;
            border-left: 2px solid rgba(15, 118, 110, 0.18);
            padding-left: 10px;
        }

        .format-block {
            display: grid;
            gap: 0;
        }

        .concept-row {
            display: grid;
            grid-template-columns: minmax(160px, 1fr) 96px auto;
            gap: 10px;
            align-items: center;
            border: 1px solid transparent;
            border-radius: var(--radius);
            padding: 10px;
            background: #f8fafb;
        }

        .concept-row:hover {
            border-color: var(--line);
            background: #fff;
        }

        .concept-name-shell {
            display: flex;
            align-items: center;
            min-width: 0;
            border: 1px solid transparent;
            border-radius: var(--radius);
            padding: 3px;
        }

        .concept-dot {
            width: 12px;
            height: 12px;
            margin-left: 8px;
            border-radius: 50%;
            flex: 0 0 12px;
        }

        .concept-input {
            width: 100%;
            min-width: 0;
            border: 0;
            padding: 6px 10px;
            background: transparent;
            color: #111827;
            font-weight: 800;
            outline: none;
        }

        .number-input {
            text-align: center;
            color: var(--accent-strong);
            font-weight: 850;
        }

        .delete-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 46px;
            height: 34px;
            border: 1px solid transparent;
            border-radius: var(--radius);
            background: transparent;
            color: var(--red);
            font-size: 12px;
            font-weight: 800;
            line-height: 1;
        }

        .delete-btn:hover {
            border-color: #f2c6c2;
            background: #fffafa;
        }

        .empty-state {
            display: grid;
            justify-items: center;
            gap: 10px;
            padding: 42px 18px;
            color: var(--muted);
            text-align: center;
        }

        .empty-title {
            color: #111827;
            font-size: 15px;
            font-weight: 900;
        }

        .reelfarm-panel {
            display: grid;
            gap: 12px;
            padding: 14px;
        }

        .reelfarm-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: start;
        }

        .reelfarm-title {
            margin: 0;
            color: #111827;
            font-size: 16px;
            font-weight: 900;
            line-height: 1.35;
        }

        .reelfarm-subtitle {
            margin-top: 4px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.55;
        }

        .reelfarm-config {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) auto;
            gap: 8px;
            border: 1px solid #badfd8;
            border-radius: var(--radius);
            padding: 10px;
            background: var(--accent-soft);
        }

        .reelfarm-list {
            display: grid;
            gap: 10px;
        }

        .reelfarm-format {
            display: grid;
            gap: 10px;
            margin-top: 8px;
            border: 1px solid #d8e7e4;
            border-radius: var(--radius);
            padding: 12px;
            background: #f6fbfa;
        }

        .reelfarm-format-head {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
        }

        .automation-prefix {
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 6px 8px;
            background: #f8fafb;
            color: #111827;
            font-size: 12px;
            font-weight: 850;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .reelfarm-cards {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .reelfarm-card {
            display: grid;
            gap: 10px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 12px;
            background: #fbfcfd;
        }

        .reelfarm-card-title {
            color: #111827;
            font-size: 14px;
            font-weight: 900;
            line-height: 1.35;
            word-break: break-word;
        }

        .reelfarm-account {
            display: flex;
            align-items: center;
            gap: 9px;
            min-width: 0;
        }

        .reelfarm-avatar {
            width: 34px;
            height: 34px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: #fff;
            flex: 0 0 34px;
        }

        .reelfarm-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .reelfarm-metrics {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
        }

        .reelfarm-mini-metric {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 8px;
            background: #fff;
        }

        .reelfarm-mini-label {
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
        }

        .reelfarm-mini-value {
            margin-top: 3px;
            color: #111827;
            font-size: 15px;
            font-weight: 900;
        }

        .slideshow-list {
            display: grid;
            gap: 10px;
        }

        .slideshow-item {
            display: grid;
            gap: 8px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 10px;
            background: #fff;
            color: inherit;
            text-decoration: none;
        }

        .slideshow-item:hover {
            border-color: var(--line-strong);
        }

        .slideshow-title {
            color: #111827;
            font-size: 12px;
            font-weight: 850;
            line-height: 1.45;
        }

        .slideshow-meta {
            color: var(--muted);
            font-size: 11px;
            line-height: 1.45;
        }

        .material-preview {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: #eef2f6;
        }

        .material-preview img {
            width: 100%;
            display: block;
            aspect-ratio: 4 / 5;
            object-fit: cover;
        }

        .slide-nav {
            position: absolute;
            top: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border: 1px solid rgba(15, 23, 42, 0.16);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.92);
            color: #111827;
            font-size: 18px;
            font-weight: 900;
            line-height: 1;
            transform: translateY(-50%);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
        }

        .slide-nav:hover {
            background: #fff;
        }

        .slide-nav.prev {
            left: 8px;
        }

        .slide-nav.next {
            right: 8px;
        }

        .slide-counter {
            position: absolute;
            right: 8px;
            bottom: 8px;
            border-radius: 999px;
            padding: 4px 8px;
            background: rgba(15, 23, 42, 0.72);
            color: #fff;
            font-size: 11px;
            font-weight: 850;
        }

        .material-data {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 5px;
        }

        .material-data-cell {
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 6px;
            background: #f8fafb;
        }

        .material-data-label {
            color: var(--muted);
            font-size: 10px;
            font-weight: 800;
        }

        .material-data-value {
            margin-top: 2px;
            color: #111827;
            font-size: 13px;
            font-weight: 900;
        }

        .database-modal {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: rgba(15, 23, 42, 0.42);
        }

        .database-modal.is-open {
            display: flex;
        }

        .database-panel {
            width: min(980px, 100%);
            max-height: min(760px, 90vh);
            overflow: hidden;
            border: 1px solid rgba(199, 211, 223, 0.9);
            border-radius: var(--radius);
            background: #fff;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.24);
        }

        .database-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--line);
            background: #f8fafc;
        }

        .database-title {
            margin: 0;
            color: #111827;
            font-size: 18px;
            line-height: 1.35;
        }

        .database-subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
            word-break: break-all;
        }

        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #fff;
            color: var(--muted);
            cursor: pointer;
            font-size: 22px;
            line-height: 1;
        }

        .database-body {
            display: grid;
            gap: 16px;
            max-height: calc(min(760px, 90vh) - 74px);
            overflow: auto;
            padding: 18px 20px 20px;
        }

        .database-stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .database-stat {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 12px;
            background: var(--surface-soft);
        }

        .database-stat-label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        .database-stat-value {
            margin-top: 6px;
            color: #111827;
            font-size: 22px;
            font-weight: 900;
        }

        .database-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .database-json {
            margin: 0;
            overflow: auto;
            max-height: 390px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 14px;
            background: #0f172a;
            color: #dbeafe;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        @media (max-width: 1080px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            .overview-grid,
            .country-grid,
            .reelfarm-cards {
                grid-template-columns: 1fr;
            }

            .pane {
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .list,
            .concept-area {
                max-height: none;
            }
        }

        @media (max-width: 760px) {
            body {
                padding: 12px;
            }

            .topbar,
            .context-line,
            .reelfarm-header,
            .reelfarm-format-head,
            .reelfarm-config {
                align-items: stretch;
                grid-template-columns: 1fr;
            }

            .top-actions {
                justify-content: stretch;
            }

            .btn,
            .status-pill {
                width: 100%;
            }

            .metrics,
            .database-stats,
            .reelfarm-metrics,
            .material-data {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .detail-grid,
            .concept-group-header,
            .concept-row {
                grid-template-columns: 1fr;
            }

            .logo-upload {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div id="launchWarning" class="launch-warning">
        <strong>当前是文件模式，数据库不会连接。</strong>
        请双击同文件夹里的 <strong>Management Table.app</strong> 打开；打开后地址应该是
        <a href="http://127.0.0.1:8765/">http://127.0.0.1:8765/</a>，不是 file://。
    </div>

    <main class="shell">
        <header class="topbar">
            <div>
                <h1>产品内容管理工作台</h1>
                <p class="subtitle">按「产品 → 国家/地区 → 创意」逐层管理，适合大量产品和市场内容。</p>
            </div>
            <div class="top-actions">
                <span id="serverStatus" class="status-pill">正在连接数据库...</span>
                <button class="btn ghost" type="button" onclick="openDatabasePanel()">打开数据库</button>
                <button class="btn ghost" type="button" onclick="resetDemoData()">恢复示例</button>
            </div>
        </header>

        <section id="metrics" class="metrics"></section>

        <section class="page-shell">
            <nav id="breadcrumbs" class="breadcrumbs"></nav>
            <section id="productsPage" class="page"></section>
            <section id="productPage" class="page"></section>
            <section id="countryPage" class="page"></section>
        </section>
    </main>
</div>

<div id="databaseModal" class="database-modal" onclick="closeDatabasePanel(event)">
    <section class="database-panel" role="dialog" aria-modal="true" aria-labelledby="databaseTitle">
        <header class="database-header">
            <div>
                <h2 id="databaseTitle" class="database-title">SQLite 数据库</h2>
                <p id="databaseSubtitle" class="database-subtitle">正在读取数据库...</p>
            </div>
            <button class="icon-btn" type="button" onclick="closeDatabasePanel()" title="关闭">×</button>
        </header>
        <div class="database-body">
            <div id="databaseStats" class="database-stats"></div>
            <div class="database-actions">
                <button class="btn ghost" type="button" onclick="openDatabasePanel()">刷新数据库视图</button>
                <button class="btn ghost" type="button" onclick="copyDatabaseJson()">复制 JSON</button>
            </div>
            <pre id="databaseJson" class="database-json">正在读取...</pre>
        </div>
    </section>
</div>

<script>
    const API_DATA_URL = '/api/data';
    const API_RESET_URL = '/api/reset';
    const API_DATABASE_URL = '/api/database';
    const API_REELFARM_CONFIG_URL = '/api/reelfarm/config';
    const API_REELFARM_MATCHES_URL = '/api/reelfarm/matches';

    const countryFlags = {
        'United States': '🇺🇸',
        'United Kingdom': '🇬🇧',
        'Japan': '🇯🇵',
        'Germany': '🇩🇪',
        'Brazil': '🇧🇷',
        'India': '🇮🇳',
        'China': '🇨🇳',
        'France': '🇫🇷',
        'Italy': '🇮🇹',
        'Canada': '🇨🇦',
        'Australia': '🇦🇺',
        'South Korea': '🇰🇷',
        'New Country': '🌐'
    };

    const countryCodes = {
        'United States': 'US',
        'United Kingdom': 'UK',
        'Japan': 'JP',
        'Germany': 'DE',
        'Brazil': 'BR',
        'India': 'IN',
        'China': 'CN',
        'France': 'FR',
        'Italy': 'IT',
        'Canada': 'CA',
        'Australia': 'AU',
        'South Korea': 'KR'
    };

    const tagColors = [
        '#2563eb',
        '#168344',
        '#b06000',
        '#7c3aed',
        '#0369a1',
        '#475467'
    ];

    let dbData = [];
    let selectedProductId = null;
    let selectedCountryId = null;
    let currentPage = 'products';
    let productSearch = '';
    let countrySearch = '';
    let latestDatabaseSnapshot = null;
    let reelFarmConfigured = false;
    let reelFarmResults = {};
    let reelFarmLoadingPrefix = '';
    let materialSlideIndexes = {};

    function generateId() {
        return Math.random().toString(36).slice(2, 11);
    }

    function createDefaultData() {
        return [
            {
                id: generateId(),
                name: 'Product A',
                logo: '',
                folder: '甲方',
                countries: [
                    {
                        id: generateId(),
                        name: 'United States',
                        concepts: [
                            { id: generateId(), name: 'Tech Focus', count: 45 },
                            { id: generateId(), name: 'Lifestyle', count: 30 }
                        ]
                    },
                    {
                        id: generateId(),
                        name: 'Japan',
                        concepts: [
                            { id: generateId(), name: 'Design/Aesthetics', count: 50 }
                        ]
                    }
                ]
            },
            {
                id: generateId(),
                name: 'Product B',
                logo: '',
                folder: '乙方',
                countries: [
                    {
                        id: generateId(),
                        name: 'Germany',
                        concepts: [
                            { id: generateId(), name: 'Efficiency', count: 28 },
                            { id: generateId(), name: 'Sustainability', count: 18 }
                        ]
                    }
                ]
            }
        ];
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function slugPart(value) {
        const cleaned = String(value || '')
            .normalize('NFKD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-zA-Z0-9]+/g, ' ')
            .trim();

        if (!cleaned) return 'Item';

        return cleaned
            .split(/\s+/)
            .map(part => part.charAt(0).toUpperCase() + part.slice(1))
            .join('');
    }

    function codeFromName(value) {
        const cleaned = String(value || '').replace(/[^a-zA-Z0-9 ]+/g, ' ').trim();
        if (!cleaned) return 'APP';
        const alias = cleaned.toLowerCase().replace(/\s+/g, '');
        if (alias === 'delust' || alias === 'dl') return 'DL';
        const compact = cleaned.replace(/\s+/g, '');
        if (compact.length <= 4) return compact.toUpperCase();

        const initials = cleaned
            .split(/\s+/)
            .map(part => part.charAt(0))
            .join('');

        return (initials || compact.slice(0, 4)).toUpperCase();
    }

    function getProductReelFarmCode(product) {
        return (product?.reelFarmCode || codeFromName(product?.name)).toUpperCase();
    }

    function getCountryReelFarmCode(country) {
        return (country?.reelFarmCode || countryCodes[country?.name] || codeFromName(country?.name)).toUpperCase();
    }

    function buildAutomationPrefix(product, country, concept) {
        const countryCode = getCountryReelFarmCode(country);
        const productCode = getProductReelFarmCode(product);
        const topic = slugPart(concept?.group || 'Topic');
        const format = slugPart(concept?.name || 'Format');
        return `${countryCode}-${productCode}-${topic}-${format}`;
    }

    function formatNumber(value) {
        const number = Number(value) || 0;
        return number.toLocaleString();
    }

    function formatSchedule(value) {
        if (Array.isArray(value)) {
            return value
                .map(item => item?.cron || item?.schedule || '')
                .filter(Boolean)
                .join(', ') || 'no schedule';
        }

        return value || 'no schedule';
    }

    function getSlideIndex(videoId) {
        return Number(materialSlideIndexes[videoId]) || 0;
    }

    function setStatus(message, type = 'ok') {
        const status = document.getElementById('serverStatus');
        if (!status) return;

        status.textContent = message;
        status.classList.toggle('error', type === 'error');
    }

    async function loadData() {
        if (window.location.protocol === 'file:') {
            dbData = createDefaultData();
            document.getElementById('launchWarning')?.classList.add('is-visible');
            setStatus('文件模式：未连接数据库', 'error');
            ensureSelection();
            return;
        }

        try {
            const response = await fetch(API_DATA_URL, { cache: 'no-store' });
            if (!response.ok) throw new Error('Failed to load database data.');

            const payload = await response.json();
            dbData = Array.isArray(payload.data) ? payload.data : createDefaultData();
            ensureSelection();
            setStatus('已连接 SQLite 数据库');
        } catch (error) {
            console.error(error);
            dbData = createDefaultData();
            ensureSelection();
            setStatus('后端未连接，当前为临时数据', 'error');
        }
    }

    async function loadReelFarmConfig() {
        if (window.location.protocol === 'file:') {
            reelFarmConfigured = false;
            return;
        }

        try {
            const response = await fetch(API_REELFARM_CONFIG_URL, { cache: 'no-store' });
            if (!response.ok) throw new Error('Failed to load ReelFarm config.');
            const payload = await response.json();
            reelFarmConfigured = Boolean(payload.configured);
        } catch (error) {
            console.error(error);
            reelFarmConfigured = false;
        }
    }

    async function persistData(shouldRender = true) {
        ensureSelection();
        if (shouldRender) renderApp();

        if (window.location.protocol === 'file:') {
            setStatus('文件模式无法保存到数据库', 'error');
            return;
        }

        try {
            setStatus('保存中...');
            const response = await fetch(API_DATA_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: dbData })
            });

            if (!response.ok) throw new Error('Failed to save database data.');
            setStatus('已保存到 SQLite 数据库');
        } catch (error) {
            console.error(error);
            setStatus('保存失败，请确认后端服务正在运行', 'error');
        }
    }

    function saveData() {
        persistData(true);
    }

    function getSelectedProduct() {
        return dbData.find(product => product.id === selectedProductId) || null;
    }

    function getSelectedCountry() {
        const product = getSelectedProduct();
        if (!product) return null;

        return (product.countries || []).find(country => country.id === selectedCountryId) || null;
    }

    function normalizeProductFolder(product) {
        if (!['甲方', '乙方'].includes(product.folder)) {
            product.folder = '甲方';
        }

        return product.folder;
    }

    function normalizeFormatGroups(country) {
        if (!country || !Array.isArray(country.concepts)) return;

        country.concepts.forEach(concept => {
            if (!concept.group) concept.group = '默认 Topic';
        });
    }

    function ensureSelection() {
        dbData.forEach(normalizeProductFolder);

        if (!dbData.some(product => product.id === selectedProductId)) {
            selectedProductId = dbData[0]?.id || null;
        }

        const product = getSelectedProduct();
        if (!product) {
            selectedCountryId = null;
            return;
        }

        if (!Array.isArray(product.countries)) product.countries = [];
        if (!product.countries.some(country => country.id === selectedCountryId)) {
            selectedCountryId = product.countries[0]?.id || null;
        }

        product.countries.forEach(normalizeFormatGroups);
    }

    function getStats(scopeProduct = null, scopeCountry = null) {
        const products = scopeProduct ? [scopeProduct] : dbData;
        const countries = products.flatMap(product => product.countries || []);
        const concepts = scopeCountry
            ? (scopeCountry.concepts || [])
            : countries.flatMap(country => country.concepts || []);
        const total = concepts.reduce((sum, concept) => sum + (Number(concept.count) || 0), 0);

        return {
            products: products.length,
            countries: countries.length,
            concepts: concepts.length,
            total
        };
    }

    function getTagColor(text) {
        let hash = 0;
        for (let i = 0; i < String(text).length; i += 1) {
            hash = String(text).charCodeAt(i) + ((hash << 5) - hash);
        }
        return tagColors[Math.abs(hash) % tagColors.length];
    }

    function getFormatGroups(concepts) {
        const groups = [];
        const byName = new Map();

        concepts.forEach(concept => {
            const groupName = concept.group || '默认 Topic';
            if (!byName.has(groupName)) {
                const group = { name: groupName, concepts: [] };
                byName.set(groupName, group);
                groups.push(group);
            }
            byName.get(groupName).concepts.push(concept);
        });

        return groups;
    }

    function renderApp() {
        ensureSelection();
        renderMetrics();
        renderBreadcrumbs();
        renderPages();
    }

    function setActivePage(page) {
        currentPage = page;
        renderApp();
    }

    function renderBreadcrumbs() {
        const product = getSelectedProduct();
        const country = getSelectedCountry();
        const crumbs = [
            `<button class="crumb-btn" type="button" onclick="goProducts()">产品总览</button>`
        ];

        if (currentPage !== 'products' && product) {
            crumbs.push('<span>/</span>');
            if (currentPage === 'country') {
                crumbs.push(`<button class="crumb-btn" type="button" onclick="goProduct('${product.id}')">${escapeHtml(product.name || '未命名产品')}</button>`);
            } else {
                crumbs.push(`<span class="crumb-current">${escapeHtml(product.name || '未命名产品')}</span>`);
            }
        }

        if (currentPage === 'country' && country) {
            crumbs.push('<span>/</span>');
            crumbs.push(`<span class="crumb-current">${escapeHtml(country.name || 'New Country')}</span>`);
        }

        document.getElementById('breadcrumbs').innerHTML = crumbs.join('');
    }

    function renderPages() {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        const page = document.getElementById(`${currentPage}Page`);
        if (page) page.classList.add('active');

        renderProductsPage();
        renderProductPage();
        renderCountryPage();
    }

    function renderProductsPage() {
        const page = document.getElementById('productsPage');
        page.innerHTML = `
            <section class="page-card">
                <div class="pane-header">
                    <div class="pane-title-row">
                        <div>
                            <h2 class="pane-title">产品总览</h2>
                            <div class="pane-hint">先从甲方 / 乙方文件夹选择产品，再继续进入国家和 Format。</div>
                        </div>
                        <button class="btn primary" type="button" onclick="addNewProduct()">新建产品</button>
                    </div>
                    <input id="productSearch" class="search-input" type="search" placeholder="搜索产品" value="${escapeHtml(productSearch)}" oninput="setProductSearch(this.value)">
                </div>
                <div id="productList" class="list"></div>
            </section>`;
        renderProducts();
    }

    function renderProductPage() {
        const page = document.getElementById('productPage');
        const product = getSelectedProduct();

        if (!product) {
            page.innerHTML = '<section class="page-card"><div class="empty-state"><div class="empty-title">选择或创建一个产品</div></div></section>';
            return;
        }

        page.innerHTML = `
            <section class="page-card">
                <div id="productDetail" class="detail"></div>
            </section>
            <section class="page-card">
                <div class="pane-header">
                    <div class="pane-title-row">
                        <div>
                            <h2 class="pane-title">国家/地区</h2>
                            <div class="pane-hint">点击国家/地区进入 Topic 和 Format。</div>
                        </div>
                        <button class="btn primary" type="button" onclick="addCountryToSelected()">新建国家/地区</button>
                    </div>
                    <input id="countrySearch" class="search-input" type="search" placeholder="搜索国家/地区" value="${escapeHtml(countrySearch)}" oninput="setCountrySearch(this.value)">
                </div>
                <div id="countryList" class="country-grid"></div>
            </section>`;
        renderProductDetail();
        renderCountries();
    }

    function renderCountryPage() {
        const page = document.getElementById('countryPage');
        const country = getSelectedCountry();

        if (!country) {
            page.innerHTML = '<section class="page-card"><div class="empty-state"><div class="empty-title">先选择国家/地区</div></div></section>';
            return;
        }

        page.innerHTML = `
            <section class="page-card">
                <div id="conceptContext" class="context-line"></div>
                <div id="conceptList" class="concept-area"></div>
            </section>`;
        renderFormats();
    }

    function renderMetrics() {
        const stats = getStats();
        document.getElementById('metrics').innerHTML = [
            ['产品', stats.products],
            ['国家/地区', stats.countries],
            ['创意', stats.concepts],
            ['总数量', stats.total]
        ].map(([label, value]) => `
            <div class="metric">
                <div class="metric-label">${label}</div>
                <div class="metric-value">${value}</div>
            </div>
        `).join('');
    }

    function renderProducts() {
        const list = document.getElementById('productList');
        const query = productSearch.trim().toLowerCase();
        const products = dbData.filter(product => !query || String(product.name).toLowerCase().includes(query));

        if (dbData.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-title">还没有产品</div>
                    <button class="btn primary" type="button" onclick="addNewProduct()">添加第一个产品</button>
                </div>`;
            return;
        }

        if (products.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="empty-title">没有匹配的产品</div><div>换一个关键词试试。</div></div>';
            return;
        }

        list.innerHTML = ['甲方', '乙方'].map(folder => {
            const folderProducts = products.filter(product => normalizeProductFolder(product) === folder);
            return renderProductFolder(folder, folderProducts);
        }).join('');
    }

    function renderProductFolder(folder, products) {
        return `
            <section class="product-folder">
                <div class="folder-heading">
                    <span>${folder}</span>
                    <span class="folder-count">${products.length} 个产品</span>
                </div>
                <div class="folder-items">
                    ${products.length === 0
                        ? '<div class="item-meta" style="padding: 8px 4px;">暂无产品</div>'
                        : products.map(renderProductItem).join('')}
                </div>
            </section>`;
    }

    function renderProductItem(product) {
            const stats = getStats(product);
            const logo = product.logo
                ? `<img src="${product.logo}" alt="${escapeHtml(product.name)} Logo">`
                : escapeHtml(String(product.name || 'P').slice(0, 1).toUpperCase());

            return `
                <button class="list-item ${product.id === selectedProductId ? 'active' : ''}" type="button" onclick="selectProduct('${product.id}')">
                    <div class="product-row">
                        <span class="logo-chip">${logo}</span>
                        <span class="item-main">
                            <span class="item-name">${escapeHtml(product.name || '未命名产品')}</span>
                            <span class="item-meta">${stats.countries} 个国家/地区 · ${stats.concepts} 个创意 · ${stats.total} 数量</span>
                        </span>
                    </div>
                </button>`;
    }

    function renderProductDetail() {
        const container = document.getElementById('productDetail');
        const product = getSelectedProduct();

        if (!product) {
            container.innerHTML = '<div class="empty-state"><div class="empty-title">选择或创建一个产品</div></div>';
            return;
        }

        const logo = product.logo
            ? `<img src="${product.logo}" alt="${escapeHtml(product.name)} Logo">`
            : 'Logo<br>上传';

        container.innerHTML = `
            <div class="detail-grid">
                <label class="logo-upload" title="点击上传 Logo">
                    ${logo}
                    <input type="file" accept="image/*" style="display:none;" onchange="handleImageUpload(this, '${product.id}')">
                </label>
                <div class="field-stack">
                    <label>
                        <span class="field-label">当前产品</span>
                        <input class="text-input" value="${escapeHtml(product.name || '')}" onchange="updateProductName('${product.id}', this.value)" onblur="updateProductName('${product.id}', this.value)">
                    </label>
                    <label>
                        <span class="field-label">所属文件夹</span>
                        <select class="text-input" onchange="updateProductFolder('${product.id}', this.value)">
                            <option value="甲方" ${normalizeProductFolder(product) === '甲方' ? 'selected' : ''}>甲方</option>
                            <option value="乙方" ${normalizeProductFolder(product) === '乙方' ? 'selected' : ''}>乙方</option>
                        </select>
                    </label>
                    <label>
                        <span class="field-label">ReelFarm 产品代码</span>
                        <input class="text-input" value="${escapeHtml(getProductReelFarmCode(product))}" placeholder="例如 DL"
                            onchange="updateProductReelFarmCode('${product.id}', this.value)"

    function renderFormatGroup(group) {

        const total = group.concepts.reduce((sum, concept) => sum + (Number(concept.count) || 0), 0);

        return `
            <section class="concept-group">

                        <span class="concept-path">Topic</span>
                        <input class="concept-input" value="${escapeHtml(group.name)}"
                            data-group="${escapeHtml(group.name)}"
                            onchange="updateFormatGroup(this.dataset.group, this.value)"
                            onblur="updateFormatGroup(this.dataset.group, this.value)">
                    </div>
                    <button class="btn ghost" type="button" data-group="${escapeHtml(group.name)}" onclick="addFormatToGroup(this.dataset.group)">添加 Format</button>
                    <button class="delete-btn" type="button" data-group="${escapeHtml(group.name)}" onclick="deleteFormatGroup(this.dataset.group)">删除组</button>
                </div>

    function renderFormatRow(concept) {
        const color = getTagColor(concept.name);
        const product = getSelectedProduct();
        const country = getSelectedCountry();
        const reelFarmHtml = product && country ? renderReelFarmFormat(product, country, concept) : '';

        return `
            <section class="format-block">
                <div class="concept-row">
                    <div class="concept-name-shell" style="border-color:${color}33; background:${color}0f;">
                        <span class="concept-dot" style="background:${color};"></span>
                        <input class="concept-input" value="${escapeHtml(concept.name || '')}"

                            onblur="updateFormatName('${concept.id}', this.value)">

                        onchange="updateFormatCount('${concept.id}', this.value)"
                        onblur="updateFormatCount('${concept.id}', this.value)">

                </div>

    function renderReelFarmFormat(product, country, concept) {
        const prefix = buildAutomationPrefix(product, country, concept);
        const result = reelFarmResults[prefix];
        const isLoading = reelFarmLoadingPrefix === prefix;
        let body = '';

        if (isLoading) {
            body = '<div class="empty-state"><div class="empty-title">正在从 ReelFarm 拉取...</div></div>';
        } else if (result?.error) {
            body = `<div class="empty-state"><div class="empty-title">同步失败</div><div>${escapeHtml(result.error)}</div></div>`;
        } else if (result?.cards?.length) {
            body = `<div class="reelfarm-cards">${result.cards.map(renderReelFarmCard).join('')}</div>`;
        } else if (result) {
            body = '<div class="empty-state"><div class="empty-title">没有找到匹配 automation</div><div>确认 ReelFarm 里 automation name 是否以这个 prefix 开头。</div></div>';
        } else {
            body = '<div class="item-meta">点击同步后，会显示每个 TikTok 账号、slideshow、播放/点赞/评论等数据。</div>';
        }

        return `
            <section class="reelfarm-format">
                <div class="reelfarm-format-head">
                    <div>
                        <span class="automation-prefix">${escapeHtml(prefix)}</span>
                        <div class="item-meta">${escapeHtml(concept.group || '默认 Topic')} · ${escapeHtml(concept.name || 'Format')}</div>
                    </div>
                    <button class="btn primary" type="button" onclick="syncReelFarmPrefix('${escapeHtml(prefix)}')">${isLoading ? '同步中...' : '同步 ReelFarm'}</button>
                </div>
                ${body}
            </section>`;
    }

    function getMetricFromCard(card, key) {
        const posts = card.posts || [];
        return posts.reduce((sum, post) => sum + (Number(post[key]) || 0), 0);
    }

    function renderReelFarmCard(card) {
        const automation = card.automation || {};
        const account = card.account || {};
        const accountName = account.account_username || account.username || account.account_name || automation.tiktok_account_id || '未绑定账号';
        const schedule = formatSchedule(automation.schedule);
        const avatar = account.account_image
            ? `<img src="${escapeHtml(account.account_image)}" alt="">`
            : '';
        const posts = card.posts || [];
        const videos = card.videos || [];
        const views = getMetricFromCard(card, 'view_count');
        const likes = getMetricFromCard(card, 'like_count');
        const comments = getMetricFromCard(card, 'comment_count');
        const shares = getMetricFromCard(card, 'share_count');
        const slideshows = videos.filter(video => String(video.video_type || '').toLowerCase().includes('slideshow') || Array.isArray(video.slideshow_images));
        const postsByVideo = new Map(posts.map(post => [String(post.video_id), post]));

        return `
            <article class="reelfarm-card">
                <div class="reelfarm-card-title">${escapeHtml(automation.title || automation.automation_id || 'Untitled automation')}</div>
                <div class="reelfarm-account">
                    <span class="reelfarm-avatar">${avatar}</span>
                    <span class="item-main">
                        <span class="item-name">@${escapeHtml(accountName)}</span>
                        <span class="item-meta">${escapeHtml(automation.status || 'unknown')} · ${escapeHtml(schedule)}</span>
                    </span>
                </div>
                <div class="reelfarm-metrics">
                    ${[
                        ['Views', views],
                        ['Likes', likes],
                        ['Comments', comments],
                        ['Shares', shares]
                    ].map(([label, value]) => `
                        <div class="reelfarm-mini-metric">
                            <div class="reelfarm-mini-label">${label}</div>
                            <div class="reelfarm-mini-value">${formatNumber(value)}</div>
                        </div>`).join('')}
                </div>
                <div class="slideshow-list">
                    ${slideshows.length
                        ? slideshows.map(video => renderMaterialItem(video, postsByVideo.get(String(video.video_id)))).join('')
                        : '<div class="item-meta">暂无素材数据</div>'}
                </div>
                ${card.errors?.videos || card.errors?.posts
                    ? `<div class="item-meta">${escapeHtml(card.errors.videos || card.errors.posts)}</div>`
                    : ''}
            </article>`;
    }

    function renderMaterialItem(video, post) {
        const title = video.hook || post?.title || video.prompt_preview || video.video_id || video.id || 'Slideshow';
        const images = Array.isArray(video.slideshow_images) ? video.slideshow_images : [];
        const imageCount = video.slide_count || images.length;
        const meta = [
            video.status || 'unknown',
            imageCount ? `${imageCount} slides` : '',
            video.finished_at || video.created_at || ''
        ].filter(Boolean).join(' · ');
        const dataRows = [
            ['Views', post?.view_count],
            ['Likes', post?.like_count],
            ['Comments', post?.comment_count],
            ['Shares', post?.share_count],
            ['Saves', post?.bookmark_count]
        ];

        const content = `
            <div class="material-preview">
                ${renderSlideImage(video, images)}
            </div>
            <div class="slideshow-title">${escapeHtml(title)}</div>
            <div class="slideshow-meta">${escapeHtml(meta)}</div>
            <div class="material-data">
                ${dataRows.map(([label, value]) => `
                    <div class="material-data-cell">
                        <div class="material-data-label">${label}</div>
                        <div class="material-data-value">${post ? formatNumber(value) : '—'}</div>
                    </div>`).join('')}
            </div>
            ${post?.published_at ? `<div class="slideshow-meta">Published ${escapeHtml(post.published_at)}</div>` : '<div class="slideshow-meta">暂无 TikTok 发布数据</div>'}`;

        return `<div class="slideshow-item">${content}</div>`;
    }

    function renderSlideImage(video, images) {
        const videoId = String(video.video_id || video.id || generateId());
        const slideIndex = Math.min(getSlideIndex(videoId), Math.max(0, images.length - 1));
        const current = images[slideIndex];

        if (!current?.image_url) {
            return '<div class="empty-state" style="padding:32px 12px;"><div class="empty-title">暂无图片</div></div>';
        }

        return `
            <img src="${escapeHtml(current.image_url)}" alt="">
            ${images.length > 1 ? `
                <button class="slide-nav prev" type="button" onclick="moveMaterialSlide('${escapeHtml(videoId)}', -1, ${images.length})" title="上一张">‹</button>
                <button class="slide-nav next" type="button" onclick="moveMaterialSlide('${escapeHtml(videoId)}', 1, ${images.length})" title="下一张">›</button>
                <span class="slide-counter">${slideIndex + 1}/${images.length}</span>
            ` : ''}
        `;
    }

    window.saveReelFarmApiKey = async function() {
        const input = document.getElementById('reelFarmApiKeyInput');
        const apiKey = input?.value?.trim() || '';
        if (!apiKey) {
            setStatus('请先粘贴 ReelFarm API Key', 'error');
            return;
        }

        try {
            setStatus('正在连接 ReelFarm...');
            const response = await fetch(API_REELFARM_CONFIG_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ api_key: apiKey })
            });
            if (!response.ok) throw new Error('Failed to save ReelFarm API key.');
            const payload = await response.json();
            reelFarmConfigured = Boolean(payload.configured);
            setStatus('ReelFarm 已连接');
            renderFormats();
        } catch (error) {
            console.error(error);
            setStatus('ReelFarm 连接失败', 'error');
        }
    };

    window.syncReelFarmPrefix = async function(prefix) {
        if (window.location.protocol === 'file:') {
            setStatus('当前是 file:// 页面，不能调 ReelFarm API', 'error');
            renderFormats();
            return;
        }

        if (!reelFarmConfigured) {
            setStatus('请先连接 ReelFarm API Key', 'error');
            renderFormats();
            return;
        }

        reelFarmLoadingPrefix = prefix;
        renderFormats();

        try {
            const response = await fetch(`${API_REELFARM_MATCHES_URL}?prefix=${encodeURIComponent(prefix)}`, { cache: 'no-store' });
            const payload = await response.json();
            if (!response.ok) throw new Error(payload.error || 'Failed to sync ReelFarm data.');
            reelFarmResults[prefix] = payload;
            setStatus(`ReelFarm 已同步：${payload.count} 个 automation`);
        } catch (error) {
            console.error(error);
            reelFarmResults[prefix] = { error: error.message || '同步失败' };
            setStatus('ReelFarm 同步失败', 'error');
        } finally {
            reelFarmLoadingPrefix = '';
            renderFormats();
        }
    };

            ['产品', snapshot.stats.products],
            ['国家/地区', snapshot.stats.countries],
            ['创意', snapshot.stats.concepts],
            ['总数量', snapshot.stats.total_count]
        ].map(([label, value]) => `
            <div class="database-stat">
                <div class="database-stat-label">${label}</div>
                <div class="database-stat-value">${value}</div>
            </div>
        `).join('');
        json.textContent = JSON.stringify(snapshot.data, null, 2);
    }

    window.openDatabasePanel = async function() {
        const modal = document.getElementById('databaseModal');
        const subtitle = document.getElementById('databaseSubtitle');
        const stats = document.getElementById('databaseStats');
        const json = document.getElementById('databaseJson');

        modal.classList.add('is-open');
        subtitle.textContent = '正在读取数据库...';
        stats.innerHTML = '';
        json.textContent = '正在读取...';

        try {
            const response = await fetch(API_DATABASE_URL, { cache: 'no-store' });
            if (!response.ok) throw new Error('Failed to open database.');

            renderDatabaseSnapshot(await response.json());
            setStatus('数据库视图已打开');
        } catch (error) {
            console.error(error);
            subtitle.textContent = '无法读取数据库，请确认后端服务正在运行。';
            json.textContent = '数据库连接失败。';
            setStatus('数据库打开失败', 'error');
        }
    };

    window.closeDatabasePanel = function(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('databaseModal').classList.remove('is-open');
    };

    window.copyDatabaseJson = async function() {
        if (!latestDatabaseSnapshot) return;

        try {
            await navigator.clipboard.writeText(JSON.stringify(latestDatabaseSnapshot.data, null, 2));
            setStatus('数据库 JSON 已复制');
        } catch (error) {
            console.error(error);
            setStatus('复制失败，浏览器未授权剪贴板', 'error');
        }
    };

    window.resetDemoData = async function() {
        if (!confirm('确定要恢复示例数据吗？数据库中保存的数据会被覆盖。')) return;

        try {
            const response = await fetch(API_RESET_URL, { method: 'POST' });
            if (!response.ok) throw new Error('Failed to reset database data.');

            const payload = await response.json();
            dbData = Array.isArray(payload.data) ? payload.data : createDefaultData();
            selectedProductId = null;
            selectedCountryId = null;
            ensureSelection();
            renderApp();
            setStatus('示例数据已写入 SQLite');
        } catch (error) {
            console.error(error);
            dbData = createDefaultData();
            selectedProductId = null;
            selectedCountryId = null;
            ensureSelection();
            renderApp();
            saveData();
        }
    };

    window.onload = async function() {
        await loadData();
        await loadReelFarmConfig();
        renderApp();
    };
</script>
</body>
</html>
